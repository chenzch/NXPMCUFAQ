|S32K324NHT1VLLSR|2x CM7|160MHz|4MB|512KB|HSE-B|No|100LQFP|105|Standard|Tape|
|S32K324NHT1MLLSR|2x CM7|160MHz|4MB|512KB|HSE-B|No|100LQFP|125|Standard|Tape|
|S32K344EHT1MLLST|1x LS CM7|160MHz|4MB|512KB|HSE-B|100Mbps|100LQFP|125|Standard|Tray|
|S32K344EHT1VLLST|1x LS CM7|160MHz|4MB|512KB|HSE-B|100Mbps|100LQFP|105|Standard|Tray|
|S32K344NHT1VLLST|1x LS CM7|160MHz|4MB|512KB|HSE-B|No|100LQFP|105|Standard|Tray|
|S32K344NHT1MLLST|1x LS CM7|160MHz|4MB|512KB|HSE-B|No|100LQFP|125|Standard|Tray|
|S32K344EHT1VLLSR|1x LS CM7|160MHz|4MB|512KB|HSE-B|100Mbps|100LQFP|105|Standard|Tape|
|S32K344EHT1MLLSR|1x LS CM7|160MHz|4MB|512KB|HSE-B|100Mbps|100LQFP|125|Standard|Tape|
|S32K344NHT1VLLSR|1x LS CM7|160MHz|4MB|512KB|HSE-B|No|100LQFP|105|Standard|Tape|
|S32K344NHT1MLLSR|1x LS CM7|160MHz|4MB|512KB|HSE-B|No|100LQFP|125|Standard|Tape|
`;
    // 解析 README 表格为 data
    function parseReadmeTable(md) {
      const lines = md.split(/\r?\n/);
      const rows = [];
      for (const raw of lines) {
        const line = raw.trim();
        if (!line.startsWith('|')) continue;
        const cols = line.split('|').filter(s => s.length > 0).map(c => c.trim());
        if (cols.length === 0) continue;
        if (cols[0] === 'Part Number') continue;
        if (cols[0] === ':---:') continue;
        if (cols.length < 11) continue;
        const [partNumber, cores, coreSpeed, flash, ram, security, ethernet, pkg, ambientTemp, software, trayTape] = cols;
        rows.push({ partNumber, cores, coreSpeed, flash, ram, security, ethernet, package: pkg, ambientTemp, software, trayTape });
      }
      return rows;
    }
    let data = [];
    try {
      data = parseReadmeTable(READMe_TABLE);
    } catch (e) {
      data = [];
    }
    // 回退数据：仅用于示例；实际数据应来自 READMe_TABLE 解析
    const inlineData = [
      { partNumber: "S32K310NHT0MPAST", cores: "1x Arm Cortex M7", coreSpeed: "120MHz", flash: "512KB", ram: "112KB", security: "HSE-B", ethernet: "No", package: "100HDQFP", ambientTemp: "125", software: "Standard", trayTape: "Tray" },
      { partNumber: "S32K310NHT0MPAIT", cores: "1x Arm Cortex M7", coreSpeed: "120MHz", flash: "512KB", ram: "112KB", security: "HSE-B", ethernet: "No", package: "100HDQFP", ambientTemp: "125", software: "ISELED", trayTape: "Tray" },
      { partNumber: "S32K310NHT0MLFST", cores: "1x Arm Cortex M7", coreSpeed: "120MHz", flash: "512KB", ram: "112KB", security: "HSE-B", ethernet: "No", package: "48LQFP", ambientTemp: "125", software: "Standard", trayTape: "Tray" },
      { partNumber: "S32K310NHT0VLFST", cores: "1x Arm Cortex M7", coreSpeed: "120MHz", flash: "512KB", ram: "112KB", security: "HSE-B", ethernet: "No", package: "48LQFP", ambientTemp: "105", software: "Standard", trayTape: "Tray" }
    ];
    if (!Array.isArray(data) || data.length === 0) data = inlineData;

    // Helpers
    function uniq(arr, key) {
      const seen = new Set(); const out = [];
      for (const it of arr) {
        const v = it[key];
        if (!seen.has(v)) { seen.add(v); out.push(v); }
      }
      return out;
    }

    function buildFilters(items) {
      const fEls = [];
      const keys = ["cores", "coreSpeed", "flash", "ram", "security", "ethernet", "package", "ambientTemp", "software", "trayTape"];
      keys.forEach(k => {
        const values = uniq(items, k);
        const select = document.createElement("select");
        select.dataset.field = k;
        const optionAll = document.createElement("option");
        optionAll.value = "";
        optionAll.textContent = `All ${k}`;
        select.appendChild(optionAll);
        values.forEach(v => {
          const opt = document.createElement("option");
          opt.value = String(v);
          opt.textContent = v;
          select.appendChild(opt);
        });
        const label = document.createElement("label");
        label.textContent = k;
        label.style.display = "block";
        const wrap = document.createElement("div");
        wrap.className = "card";
        wrap.appendChild(label);
        wrap.appendChild(select);
        fEls.push(wrap);
      });
      // Part filter hint for URL param
      const partLabel = document.createElement("div");
      partLabel.textContent = "Part (from URL 'part' param)";
      partLabel.className = "card";
      fEls.unshift(partLabel);

      const resetBtn = document.createElement("button");
      resetBtn.textContent = "Reset Filters";
      resetBtn.type = "button";
      resetBtn.className = "card";
      resetBtn.style.cursor = "pointer";
      resetBtn.style.padding = "8px 16px";
      resetBtn.style.marginTop = "8px";
      resetBtn.onclick = resetFilters;
      fEls.push(resetBtn);

      return fEls;
    }

    function resetFilters() {
      const keys = ["cores", "coreSpeed", "flash", "ram", "security", "ethernet", "package", "ambientTemp", "software", "trayTape"];
      keys.forEach(k => {
        const select = document.querySelector(`.filters select[data-field="${k}"]`);
        if (select) select.value = "";
      });
      renderTable(data);
      rebuildFilters(data);
    }

    function rebuildFilters(filteredData) {
      const keys = ["cores", "coreSpeed", "flash", "ram", "security", "ethernet", "package", "ambientTemp", "software", "trayTape"];
      keys.forEach(k => {
        const select = document.querySelector(`.filters select[data-field="${k}"]`);
        if (!select) return;
        const currentValue = select.value;
        const values = uniq(filteredData, k);
        select.innerHTML = "";
        const optionAll = document.createElement("option");
        optionAll.value = "";
        optionAll.textContent = `All (${k})`;
        select.appendChild(optionAll);
        values.forEach(v => {
          const opt = document.createElement("option");
          opt.value = String(v);
          opt.textContent = v;
          select.appendChild(opt);
        });
        if (values.includes(currentValue)) {
          select.value = currentValue;
        } else {
          select.value = "";
        }
      });
    }

    function renderTable(rows) {
      const thead = document.getElementById("thead");
      const tbody = document.getElementById("tbody");
      thead.innerHTML = "";
      tbody.innerHTML = "";
      const fields = ["cores", "coreSpeed", "flash", "ram", "security", "ethernet", "package", "ambientTemp", "software", "trayTape"];
      const labels = ["Cores", "Core Speed", "Flash", "RAM", "Security", "Ethernet", "Package", "Ambient Temp", "Software", "Tray/Tape"];
      const h = document.createElement("tr");
      const hh = document.createElement("th"); hh.textContent = "Part Number"; h.appendChild(hh);
      rows.forEach(r => { const th = document.createElement("th"); th.textContent = r.partNumber; h.appendChild(th); });
      thead.appendChild(h);
      fields.forEach((field, i) => {
        const tr = document.createElement("tr");
        const th = document.createElement("th"); th.textContent = labels[i]; tr.appendChild(th);
        rows.forEach(r => { const td = document.createElement("td"); td.textContent = r[field]; tr.appendChild(td); });
        tbody.appendChild(tr);
      });
    }

    function applyFilters() {
      const selects = Array.from(document.querySelectorAll(".filters select"));
      let filtered = data.slice();
      const map = {
        cores: "cores",
        coreSpeed: "coreSpeed",
        flash: "flash",
        ram: "ram",
        security: "security",
        ethernet: "ethernet",
        package: "package",
        ambientTemp: "ambientTemp",
        software: "software",
        trayTape: "trayTape"
      };
      selects.forEach(sel => {
        const val = sel.value; const key = map[sel.dataset.field];
        if (val) filtered = filtered.filter(it => String(it[key]) === val);
      });
      // URL param 'part'
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.has("part")) {
        const parts = urlParams.get("part").split(",").map(p => p.trim()).filter(Boolean);
        if (parts.length) filtered = filtered.filter(it => parts.includes(it.partNumber));
      }
      renderTable(filtered);
      // 重新生成filter选项，仅包含当前可见项的选择
      rebuildFilters(filtered);
    }

    function init() {
      const filters = document.getElementById("filters");
      filters.innerHTML = "";
      const fEls = buildFilters(data);
      fEls.forEach(el => filters.appendChild(el));
      filters.querySelectorAll("select").forEach(sel => sel.addEventListener("change", applyFilters));
      applyFilters();
    }
    window.addEventListener("DOMContentLoaded", init);
  </script>
</body>
